server:
  port: 8085

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:h2:mem:notidb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true

app:
  jwt:
    secret: ChangeThisSecretKeyForDemoOnly1234567890
    expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:5173
